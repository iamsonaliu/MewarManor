<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book a Table</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Roboto&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Roboto', 'sans-serif'],
            serif: ['Playfair Display', 'serif'],
          },
        },
      },
    };
  </script>
</head>

<body class="font-sans bg-gray-50">

  <!-- Header -->
  <header class="bg-[#1f2937] text-white text-center py-5">
    <h1 class="text-4xl font-serif font-bold">My Restaurant</h1>
  </header>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-[#374151]">
    <div class="container">
      <a class="navbar-brand text-white fw-bold" href="./index.html">Home</a>
      <div class="navbar-nav">
        <a class="nav-link text-white" href="./menu.html">Menu</a>
        <a class="nav-link active text-white" href="./booking.html">Book a Table</a>
      </div>
    </div>
  </nav>

  <!-- Booking Form Section -->
  <section class="bg-gradient-to-br from-yellow-50 to-white py-5 px-3">
    <div class="container">
      <h2 class="text-3xl font-serif text-center mb-5">Book a Table</h2>

      <div class="bg-white shadow-lg rounded-xl p-4 sm:p-6 lg:p-8 max-w-3xl mx-auto">
        <form action="https://form.taxi/s/twvduofc" method="post" class="space-y-4">

          <div>
            <label for="name" class="form-label font-semibold">Full Name</label>
            <input type="text" class="form-control" id="name" name="name" required />
          </div>

          <div>
            <label for="email" class="form-label font-semibold">Email</label>
            <input type="email" class="form-control" id="email" name="email" required />
          </div>

          <div>
            <label for="phone" class="form-label font-semibold">Phone</label>
            <input type="tel" class="form-control" id="phone" name="phone" pattern="[0-9]{10}" required />
          </div>

          <div>
            <label for="guests" class="form-label font-semibold">Number of Guests</label>
            <input type="number" class="form-control" id="guests" name="guests" min="1" max="20" required />
          </div>

          <div>
            <label for="date" class="form-label font-semibold">Date</label>
            <input type="date" class="form-control" id="date" name="date" required />
          </div>

          <div>
            <label for="time" class="form-label font-semibold">Time</label>
            <input type="time" class="form-control" id="time" name="time" required />
          </div>

          <div>
            <label class="form-label font-semibold">Seating Preference</label><br />
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="seating" id="indoor" value="Indoor" required />
              <label class="form-check-label" for="indoor">Indoor</label>
            </div>
            <div class="form-check form-check-inline ms-2">
              <input class="form-check-input" type="radio" name="seating" id="outdoor" value="Outdoor" />
              <label class="form-check-label" for="outdoor">Outdoor</label>
            </div>
          </div>

          <div>
            <label for="requests" class="form-label font-semibold">Special Requests</label>
            <textarea id="requests" name="requests" class="form-control" rows="3" placeholder="Optional"></textarea>
          </div>

          <div class="text-center">
            <button type="submit" class="btn btn-primary px-4 py-2 text-lg rounded">Book Now</button>
          </div>
        </form>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-[#1f2937] text-white text-center p-4 mt-5">
    <p class="mb-2">© 2025 Mewar Manor | Designed by Sonali Upadhyay</p>
    <div>
      <a href="tel:+919876543210" class="text-white me-3 text-decoration-none">Call</a>
      <a href="mailto:sonaliupadhyay31@gmail.com" class="text-white me-3 text-decoration-none">Mail us</a>
      <a href="https://www.google.com/maps/place/Clement+Town,+Dehradun,+Uttarakhand+248002/@30.2681909,77.9874514,14z/data=!3m1!4b1!4m6!3m5!1s0x39092befa7608ead:0xe723fed2168f7a8d!8m2!3d30.2685607!4d78.0071039!16zL20vMGYxOXB2?entry=ttu&g_ep=EgoyMDI1MDUwNy4wIKXMDSoASAFQAw%3D%3D"
        class="text-white me-3 text-decoration-none" target="_blank">Location</a>
      <a href="https://wa.me/9876543210" target="_blank" class="text-white text-decoration-none">WhatsApp</a>
    </div>
  </footer>

</body>

</html>
